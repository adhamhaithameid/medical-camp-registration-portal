name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Run Coverage
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Upload Coverage Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            server/coverage
            client/coverage
          if-no-files-found: ignore

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Install Playwright Browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E
        run: pnpm test:e2e

      - name: Upload Playwright Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  docker-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and Start Docker Compose
        run: docker compose up --build -d

      - name: Wait For Health Endpoint
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..30}; do
            if curl -fsS "http://localhost:4000/api/health" > /tmp/health.json; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 3
          done
          echo "Timed out waiting for /api/health"
          exit 1

      - name: Show App Logs On Failure
        if: failure()
        run: docker compose logs app

      - name: Shutdown Docker Compose
        if: always()
        run: docker compose down -v
