services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: file:/app/server/prisma/data/medical-camp.db
      JWT_SECRET: replace-with-a-strong-secret
      JWT_EXPIRES_IN: 8h
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin12345
      CORS_ORIGIN: http://localhost:4000
    volumes:
      - medical-camp-db:/app/server/prisma/data

volumes:
  medical-camp-db:
